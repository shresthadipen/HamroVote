<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HamroVote</title>
    
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .input-focus:focus { border-color: #4f46e5; background-color: white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check-double text-white text-xl"></i>
            </div>
            <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Welcome Back</h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-2">Secure Voting Portal Access</p>
        </div>

        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-[2rem] border border-slate-200 p-8 md:p-10 shadow-sm">
            
            <!-- Django Messages -->
            {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                <div class="p-3 rounded-xl border {% if message.tags == 'error' %}bg-red-50 border-red-100 text-red-600{% else %}bg-indigo-50 border-indigo-100 text-indigo-600{% endif %} text-[11px] font-bold text-center">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'accounts:login' %}" class="space-y-5">
                {% csrf_token %}
                
                <!-- ID Field -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Username | Email </label>
                    <input type="text" name="username" required
                           class="w-full bg-slate-50 border border-slate-100 rounded-xl py-3.5 px-4 text-sm outline-none transition-all input-focus"
                           placeholder="Enter your Username or Email">
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input type="password" name="password" required
                           class="w-full bg-slate-50 border border-slate-100 rounded-xl py-3.5 px-4 text-sm outline-none transition-all input-focus"
                           placeholder="••••••••">
                </div>

                <!-- Action Button -->
                <div class="pt-4">
                    <button type="submit"
                            class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all active:scale-[0.98]">
                        Sign In
                    </button>
                </div>
            </form>

            <!-- Signup Link -->
            <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                <p class="text-xs text-slate-400">
                    Don't have an account? 
                    <a href="{% url 'accounts:register' %}" class="text-indigo-600 font-bold hover:underline">Register</a>
                </p>
            </div>
        </div>

        <!-- Navigation Link -->
        <div class="mt-8 text-center">
            <a href="{% url 'voter:landing' %}" class="inline-flex items-center text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                <i class="fas fa-arrow-left mr-2 text-[10px]"></i> Go back to Home
            </a>
        </div>
    </div>

</body>
</html>
