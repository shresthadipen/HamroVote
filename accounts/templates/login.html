<!-- accounts/templates/accounts/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HamroVote</title>
    
    {% load static %}
    <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600 mb-4">
                    <i class="fas fa-vote-yea text-white text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-900">Login to HamroVote</h2>
                <p class="mt-2 text-gray-600">Secure voting system</p>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-8">
                <form method="POST" action="{% url 'accounts:login' %}" class="space-y-6">
                    {% csrf_token %}
                    
                    {% if messages %}
                    <div class="space-y-2">
                        {% for message in messages %}
                        <div class="p-3 rounded-lg {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                            <i class="fas fa-exclamation-circle mr-2"></i>{{ message }}
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Email or Registration Number
                        </label>
                        <input type="text" name="username" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                               placeholder="email@example.com or 12345">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>
                        <input type="password" name="password" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                               placeholder="Enter password">
                    </div>

                    <button type="submit"
                            class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 font-medium">
                        Sign In
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Don't have an account?
                        <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:text-blue-800 font-medium">
                            Register here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
