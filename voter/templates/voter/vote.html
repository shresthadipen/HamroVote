{% extends 'voter/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-20">
    <div class="bg-white rounded-[2.5rem] border border-gray-100 shadow-2xl p-10 text-center">
        
        <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-8">
            <i class="fas fa-exclamation-triangle text-3xl"></i>
        </div>

        <h1 class="text-3xl font-black text-gray-900 mb-4">Confirm Selection</h1>
        <p class="text-gray-500 mb-10 leading-relaxed px-6">
            You are about to vote for <span class="font-bold text-indigo-600">{{ candidate.name }}</span> as <span class="font-bold text-gray-800">{{ candidate.position.title }}</span>. This action cannot be undone.
        </p>

        <!-- FORM SUBMIT -->
        <form method="POST">
            {% csrf_token %}
            <div class="flex flex-col gap-4">
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all active:scale-95">
                    Yes, Confirm My Vote
                </button>
                <a href="{% url 'voter:candidates' candidate.position.id %}" class="py-4 text-gray-400 font-bold text-sm hover:text-gray-600 transition-colors">
                    No, take me back
                </a>
            </div>
        </form>
        
    </div>
</div>
{% endblock %}
