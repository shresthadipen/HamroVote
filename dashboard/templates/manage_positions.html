{% extends 'dashboard/base.html' %}
{% block page_title %}Voting Positions{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
    <div class="card p-8 h-fit">
        <h3 class="font-bold mb-6">Create New Position</h3>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="text" name="title" placeholder="e.g. Class President" class="input-style" required>
            <textarea name="description" placeholder="Short description..." class="input-style" rows="3"></textarea>
            <button type="submit" name="add_position" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Save Position</button>
        </form>
    </div>

    <div class="lg:col-span-2 space-y-4">
        {% for p in positions %}
        <div class="card p-6 flex justify-between items-center">
            <div>
                <h4 class="font-bold text-lg text-white">{{ p.title }}</h4>
                <p class="text-sm text-gray-500">{{ p.candidates.count }} Candidates registered</p>
            </div>
            <div class="flex space-x-3">
                <a href="{% url 'dashboard:edit_position' p.id %}" class="p-2 text-indigo-400 hover:text-indigo-300"><i class="fas fa-edit"></i></a>
<a href="{% url 'dashboard:delete_position' p.id %}" onclick="return confirm('Delete this position?')" class="p-2 text-red-500"><i class="fas fa-trash"></i></a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
