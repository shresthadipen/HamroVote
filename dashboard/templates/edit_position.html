{% extends 'dashboard/base.html' %}
{% block page_title %}Edit Position{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card p-8">
        <h2 class="text-2xl font-bold text-white mb-8">Update Position Details</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Position Title</label>
                    <input type="text" name="title" value="{{ position.title }}" class="input-style" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Description</label>
                    <textarea name="description" rows="4" class="input-style">{{ position.description }}</textarea>
                </div>
                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl font-bold">Update Position</button>
                    <a href="{% url 'dashboard:manage_positions' %}" class="flex-1 bg-gray-800 text-center py-3 rounded-xl font-bold">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
